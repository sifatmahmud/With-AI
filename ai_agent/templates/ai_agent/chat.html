<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <title>AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-6">
      <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">🤖 AI Agent</h1>

      <!-- Chat Box -->
      <div id="chat-box" class="h-96 overflow-y-auto border rounded-lg p-4 mb-4 bg-gray-50 flex flex-col gap-3">
        <p class="text-gray-400 text-center text-sm">কিছু জিজ্ঞেস করো...</p>
      </div>

      <!-- Input Area -->
      <div class="flex gap-2">
        <input
          id="user-input"
          type="text"
          placeholder="তোমার প্রশ্ন লিখো..."
          class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          onkeydown="if (event.key === 'Enter') sendMessage();"
        />
        <button
          onclick="sendMessage()"
          class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-lg font-semibold transition"
        >
          পাঠাও
        </button>
      </div>
    </div>

    <script>
      async function sendMessage() {
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = input.value.trim();

        if (!message) return;
        input.value = "";

        // User message দেখাও
        chatBox.innerHTML += `
        <div class="flex justify-end">
            <p class="bg-blue-500 text-white px-4 py-2 rounded-lg max-w-xs">${message}</p>
        </div>`;

        // Loading দেখাও
        chatBox.innerHTML += `
        <div id="loading" class="flex justify-start">
            <p class="bg-gray-200 px-4 py-2 rounded-lg text-gray-500">ভাবছি...</p>
        </div>`;

        chatBox.scrollTop = chatBox.scrollHeight;

        // API call
        const res = await fetch("/agent/chat/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await res.json();

        // Loading সরিয়ে reply দেখাও
        document.getElementById("loading").remove();
        chatBox.innerHTML += `
        <div class="flex justify-start">
            <p class="bg-gray-200 px-4 py-2 rounded-lg max-w-xs">${data.reply}</p>
        </div>`;

        chatBox.scrollTop = chatBox.scrollHeight;
      }
    </script>
  </body>
</html>
